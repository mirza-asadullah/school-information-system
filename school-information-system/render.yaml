services:
  # FastAPI Backend Service
  - type: web
    name: school-info-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free # Change to standard/starter for production
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: school-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "120"
      - key: CORS_ORIGINS
        value: "*" # Set to your deployed frontend URL on production
      - key: SUPER_ADMIN_ROLE
        value: super_admin
      - key: SCHOOL_ADMIN_ROLE
        value: school_admin
      - key: STUDENT_ROLE
        value: student

# PostgreSQL Database Service
databases:
  - name: school-db
    plan: free # Change to paid tier if you want persistent storage (Render free DBs expire after 30 days)
